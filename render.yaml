services:
  - type: web
    name: goodrich
    runtime: node
    plan: free
    autoDeploy: true
    buildCommand: npm ci --include=dev --no-audit --no-fund && npm run build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: NODE_ENV
        value: production
      - key: MONGODB_ENABLED
        value: "true"
      - key: JWT_SECRET
        sync: false
      - key: MONGODB_URI
        sync: false


