services:
  - type: web
    name: goodrich-backend
    runtime: node
    plan: free
    autoDeploy: true
    buildCommand: npm ci --include=dev --no-audit --no-fund
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5174"
      - key: MONGODB_ENABLED
        value: "true"
      - key: JWT_SECRET
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
